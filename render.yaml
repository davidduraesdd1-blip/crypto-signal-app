# Render IaC blueprint for the crypto-signal-app FastAPI service.
#
# Phase D D2: this file documents the deploy David configured by hand
# in the Render dashboard, so the configuration lives in git and a
# fresh Render account can recreate the deploy with one click via
# https://render.com/deploy?repo=<repo-url>.
#
# When committed, Render reads this on every push and reconciles the
# live service against it (the dashboard becomes a UI on top of git
# state, not the source of truth). Env vars marked `sync: false` must
# still be set in the Render dashboard — render.yaml never carries
# secret values.
#
# Spec: https://render.com/docs/yaml-spec
# Plan: docs/redesign/2026-05-02_phase-d-streamlit-retirement.md (§6 D2)

services:
  - type: web
    name: crypto-signal-app                # matches the dashboard service name created in D2
    runtime: python
    # AUDIT-2026-05-04 (D8 Path A — Render disk constraint):
    # Render persistent disks attach to a single service, so the
    # original Outcome C plan (separate worker tier with shared disk)
    # is invalid. Path A: single Starter web service runs both uvicorn
    # AND the scheduler (as a daemon thread inside the uvicorn process,
    # via api.py's CRYPTO_SIGNAL_AUTOSTART_SCHEDULER hook). Same $7/mo
    # Cowork already approved, simpler architecture, no cross-process
    # SQLite contention. Starter tier doesn't sleep, so the scheduler
    # keeps ticking 24/7.
    plan: starter                       # $7/mo, 512 MB RAM, no idle sleep, supports persistent disks
    region: oregon                      # US West — matches David's manual config
    branch: main                        # post-D8 cutover (2026-05-04): production lives on main
    autoDeploy: true                    # redeploy on every push to the branch
    healthCheckPath: /health            # used by Render's load balancer + Cron-job.org keep-alive ping

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT

    # Persistent disk — covers crypto_model.db AND data/scheduler.log via the
    # shared `data/` parent. Both processes (web + worker) mount the same disk
    # so the worker's writes are durable and the web side reads the same file.
    # 1 GB is well above current footprint; expand later via dashboard.
    disk:
      name: crypto-signal-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1

    envVars:
      # AUDIT-2026-05-03 (CRITICAL C-1 — RESOLVED 2026-05-03):
      # IaC-default-secure: `false` so a fresh deploy or a dashboard
      # reset never reopens the C-1 bypass. The dashboard value (also
      # `false` post-2026-05-03) wins at runtime; this YAML entry
      # exists so a `render.com/deploy?repo=...` one-click recreate
      # starts in the closed state. To re-enable for local dev, set
      # CRYPTO_SIGNAL_ALLOW_UNAUTH=true in the local environment only
      # (never via render.yaml or the production dashboard). Pair with
      # CRYPTO_SIGNAL_API_KEY below — that's the durable auth source.
      - key: CRYPTO_SIGNAL_ALLOW_UNAUTH
        value: "false"

      # AUDIT-2026-05-03 (CRITICAL C-1): production API key — read by
      # routers/deps.py and api.py before falling back to
      # alerts_config.json. Rendering's file system is ephemeral, so
      # this env var is the only persistent key home. Set in dashboard
      # only — never commit a value here.
      - key: CRYPTO_SIGNAL_API_KEY
        sync: false

      # AUDIT-2026-05-04 (D8 Path A): when true, api.py spawns a daemon
      # thread on import that runs scheduler.start_scheduler() — same
      # autoscan + feedback loop + position updates + alerts that the
      # original BlockingScheduler did, but in-process so a single
      # Starter web tier ($7/mo) covers everything. Tests + local dev
      # leave this unset so they don't spawn the thread.
      - key: CRYPTO_SIGNAL_AUTOSTART_SCHEDULER
        value: "true"

      # Disable Anthropic LLM at process start; AI Assistant endpoints
      # gracefully return source="unavailable" without a key. Real key
      # goes in via dashboard env var (sync: false) when David is ready
      # to spend on Claude tokens.
      - key: ANTHROPIC_ENABLED
        value: "false"

      - key: ANTHROPIC_API_KEY
        sync: false                     # set in Render dashboard, never in git

      # Demo mode keeps any non-essential network calls quiet during
      # cold-start so /health reliably returns within Render's 60s
      # health-check window. Match the conftest.py default.
      - key: DEMO_MODE
        value: "true"

      # Pin Python version to match Streamlit Cloud (Python 3.11). Also
      # honored via runtime.txt at repo root (`python-3.11`). Both kept
      # so neither tool surprises us on a future redeploy.
      - key: PYTHON_VERSION
        value: "3.11"

      # External-data API keys — set in Render dashboard, never in git.
      # Each one auto-enables a feature in config.py when present; the
      # absence path is graceful per CLAUDE.md §10 fallback chains.
      - key: CRYPTOPANIC_API_KEY
        sync: false
      - key: SUPERGROK_COINGECKO_API_KEY
        sync: false
      - key: COINMARKETCAP_API_KEY
        sync: false
      - key: ETHERSCAN_API_KEY
        sync: false
      - key: ZERION_API_KEY
        sync: false
      - key: SUPERGROK_SENTRY_DSN
        sync: false
      - key: CRYPTORANK_API_KEY
        sync: false

      # Live trading credentials (OKX) — set in Render dashboard only
      # when David flips live_trading_enabled. Until then, paper-trade
      # path runs without these; api.py startup auth-check guards the
      # combination "live_trading + no api_key".
      - key: OKX_API_KEY
        sync: false
      # AUDIT-2026-05-04 (B2): canonical name is OKX_API_SECRET. The
      # backend also accepts the legacy OKX_SECRET as a fallback (see
      # alerts.py _SENSITIVE_ENV_FALLBACKS, execution.py:205) so deploys
      # set with the older name keep working until rotated.
      - key: OKX_API_SECRET
        sync: false
      - key: OKX_PASSPHRASE
        sync: false

# Worker service intentionally removed (was: crypto-signal-scheduler).
# Render's persistent disks attach to a single service, so the original
# Outcome C plan (worker + shared disk) was structurally invalid. The
# scheduler now runs as a daemon thread inside uvicorn — gated by the
# CRYPTO_SIGNAL_AUTOSTART_SCHEDULER env var on the web service above.
# Architecture rationale: docs/audits/2026-05-04_scheduler-inventory.md.
