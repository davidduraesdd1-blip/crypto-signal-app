[theme]
base = "dark"
primaryColor = "#00D4AA"
backgroundColor = "#080B12"
secondaryBackgroundColor = "#111520"
textColor = "#F8FAFC"
font = "sans serif"

[server]
headless = true
port = 8501
enableCORS = false
enableXsrfProtection = true
enableSerializableSessionState = true

[browser]
gatherUsageStats = false

[runner]
fastReruns = true
enforceSerializableSessionState = true
