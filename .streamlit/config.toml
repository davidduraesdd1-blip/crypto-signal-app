[theme]
base = "dark"
primaryColor = "#00d4aa"
backgroundColor = "#080b12"
secondaryBackgroundColor = "#111520"
textColor = "#e8ecf4"
font = "sans-serif"

[browser]
gatherUsageStats = false

[runner]
fastReruns = true
enforceSerializableSessionState = true

[server]
headless = true
port = 8501
enableCORS = false
enableXsrfProtection = true
