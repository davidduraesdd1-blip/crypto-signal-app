name: Dependency Audit

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 9 * * 1"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install pip-audit
      # P1 audit fix — was `|| true` which suppressed every CVE finding;
      # pip-audit failures are now CI-gating. Use --strict so any HIGH or
      # CRITICAL vulnerability fails the workflow. Specific known-and-
      # accepted CVEs go in --ignore-vuln (mirror of security.yml).
      - name: Run pip-audit
        run: pip-audit -r requirements.txt --strict
