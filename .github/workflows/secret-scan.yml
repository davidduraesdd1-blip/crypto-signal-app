# P1 audit fix — security.yml already runs an identical gitleaks job
# on push to main + PRs to main + weekly cron. Running this workflow
# on the same triggers was duplicate work. Triggers narrowed to
# `develop` and feature/* branches so this file complements rather
# than duplicates security.yml's coverage.
name: Secret Scanning (non-main branches)

on:
  push:
    branches: ["develop", "feature/**", "redesign/**", "claude/**"]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
