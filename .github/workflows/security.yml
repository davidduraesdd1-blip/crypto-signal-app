name: Security Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1'   # weekly Monday 6am UTC

jobs:
  pip-audit:
    name: pip-audit vulnerability scan
    runs-on: ubuntu-latest
    # P1 audit fix — `continue-on-error: true` previously masked CVE
    # findings. Removed so the job actually fails on a real vulnerability.
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install pip-audit
        run: pip install pip-audit
      # P1 audit fix — was `|| true`; HIGH/CRITICAL CVEs now gate merges.
      # NOTE: pip-audit's flag is `--format` (or `-f`), NOT
      # `--output-format`. Earlier revisions of this file used the
      # wrong flag name; pip-audit then parsed the format value
      # ("columns") as a positional project_path, which conflicts
      # with -r/--requirement and crashed before any scan ran. Fixed.
      - name: Run pip-audit
        run: |
          pip-audit -r requirements.txt \
            --ignore-vuln PYSEC-2022-42974 \
            --format columns \
            --progress-spinner off
      # Artifact upload runs even on failure so the report is always
      # available for triage. The `|| true` here is intentional: the
      # report write must not gate the workflow.
      - name: Upload audit report
        if: always()
        run: pip-audit -r requirements.txt --format json > pip-audit-report.json 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  secret-scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
